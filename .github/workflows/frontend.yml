name: Docker Build and Push Frontend

on:
  pull_request:
    types:
      - closed
    branches:
      - "develop"
      - "homolog"
    paths:
      - "frontend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  DEPLOY_ENV: ${{ case(github.ref_name == 'main', 'production', 'staging') }}

